packages:
  - apps/*
  - packages/*

catalog:
  '@tailwindcss/vite': ^4.3.2
  '@vercel/analytics': ^2.0.1
  astro: 7.0.6
  sharp: ^0.35.3
  tailwindcss: ^4.3.2

catalogMode: prefer

allowBuilds:
  esbuild: true
  sharp: true

minimumReleaseAgeExclude:
  - '@astrojs/internal-helpers@0.10.1'
  - '@astrojs/markdown-satteri@0.3.3'
  - astro@7.0.6

onlyBuiltDependencies:
  - esbuild
  - sharp
